<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mc schem viewer</title>
<link rel="icon" href="data:,">

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  #view { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #panel {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(20,24,30,.78); color: #eef; padding: 12px 14px;
    border-radius: 10px; backdrop-filter: blur(4px); min-width: 220px;
    box-shadow: 0 4px 18px rgba(0,0,0,.3);
  }
  #panel h1 { font-size: 14px; margin: 0 0 8px; letter-spacing: .03em; }
  .row { display: flex; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
  button, label.btn {
    background: #3a6fd8; color: #fff; border: 0; border-radius: 6px;
    padding: 6px 10px; font-size: 13px; cursor: pointer;
  }
  button:hover, label.btn:hover { background: #4f82e8; }
  button.ghost { background: #444b57; }
  button.ghost:hover { background: #565e6c; }
  button:disabled { opacity: .5; cursor: default; }
  #compass { font-weight: 600; font-size: 13px; padding: 4px 0; }
  #compassDial { flex: 0 0 auto; }
  #save { position: relative; }
  #save.badge::after { content: ''; position: absolute; top: -5px; right: -5px; width: 11px; height: 11px; border-radius: 50%; background: #e53935; border: 2px solid #2c323c; }
  #info { font-size: 11px; opacity: .8; margin-top: 6px; line-height: 1.5; }
  input[type=file] { display: none; }
  .hint { font-size: 11px; opacity: .65; margin-top: 8px; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js",
    "three/addons/OrbitControls.js": "./vendor/OrbitControls.js"
  }
}
</script>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="panel">
    <h1>🏠 mc schem viewer</h1>
    <div class="row" style="align-items:center;gap:10px;">
      <canvas id="compassDial" width="64" height="64" title="現在の視点の方角"></canvas>
      <div id="compass">—</div>
    </div>
    <div class="row">
      <button id="rotL" class="ghost">⟲ 左90°</button>
      <button id="rotR" class="ghost">右90° ⟳</button>
      <button id="reset" class="ghost">⟳ 0°</button>
    </div>
    <div class="row">
      <label class="btn" for="file">📂 開く</label>
      <input type="file" id="file" accept=".schem,.litematic">
      <button id="save">💾 回転を保存</button>
    </div>
    <div class="row">
      <label for="version" style="font-size:12px;align-self:center;">表示:</label>
      <select id="version" style="background:#444b57;color:#fff;border:0;border-radius:6px;padding:5px 8px;font-size:13px;"></select>
      <button id="dlTex" class="ghost" title="Mojang公式から最新テクスチャをブラウザ内で取得（各自取得＝再配布なし）">⬇ テクスチャDL</button>
    </div>
    <div class="row">
      <label for="biome" style="font-size:12px;align-self:center;">バイオーム:</label>
      <select id="biome" title="葉・草・水の色" style="background:#444b57;color:#fff;border:0;border-radius:6px;padding:5px 8px;font-size:13px;"></select>
    </div>
    <div id="info">—</div>
    <div id="texNote" class="hint" style="display:none;color:#ffd27a;">
      色キューブ表示です。<b>⬇ テクスチャDL</b> で Mojang 公式から最新テクスチャをブラウザ内取得できます
      （各自のブラウザが直接取得＝再配布なし）。ローカルなら <code>node tools/fetch_assets.mjs</code> でも可。
    </div>
    <div class="hint">
      WASD: 移動 (W等ダブルタップでダッシュ) / Space: 上昇 / Shift: 下降<br>
      左ドラッグ: 視点回転 (その場) / ホイール: 前後ズーム / 中・右ドラッグ: 平行移動<br>
      .schem / .litematic をドロップでも開けます
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
